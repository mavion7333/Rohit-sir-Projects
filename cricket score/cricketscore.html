<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Score</title>
    <link rel="stylesheet" href="cricketscore.css">
    
</head>

<body>
    <div id="wrapper">

        <div class="adding">
            <div class="name">
                <input type="text" placeholder="First Name" id="firstname" autofocus>
                <input type="text" placeholder="Last Name" id="lastname">
            </div>
            <select name="" id="country">
                <option value="">Select Country</option>
                <option value="ind">India</option>
                <option value="pak">Pakisthan</option>
                <option value="england">England</option>
                <option value="south africa">South Africa</option>
                <option value="aus">Austrlia</option>
            </select>
            <input type="number" placeholder="Enter Score" class="score"
            >
            <button type="button" class="addbtn" value="Add butoon">ADD</button>
        </div>
        <div id="output">
            
        </div>
    </div>
    <script src="cricketscore.js"></script>
</body>

</html>
